<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mapa de asientos | Auditorio Jorge Jimenez Cantu</title>
  <meta name="description" content="Mapa de asientos en tiempo real para Auditorio Jorge Jimenez Cantu." />
  <style>
    :root {
      --bg: #12041f;
      --panel: #fff9f1;
      --line: #980b13;
      --gold: #d59c0a;
      --gold-2: #f6c53a;
      --pink: #ff4fa3;
      --pink-2: #ff88c4;
      --blue: #4fc3f7;
      --blue-2: #9ee6ff;
      --selected: #58e36f;
      --occupied-total: #5a535e;
      --occupied-partial: #8b5a2b;
      --white: #fff;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
      --seat: 30px;
      --gap: 8px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--white);
      background:
        radial-gradient(circle at 12% 10%, rgba(255, 79, 163, 0.28), transparent 30%),
        radial-gradient(circle at 80% 16%, rgba(246, 197, 58, 0.28), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(79, 195, 247, 0.26), transparent 38%),
        var(--bg);
    }

    body {
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .map-only-shell {
      width: min(1540px, 100%);
    }

    .map-card {
      position: relative;
      overflow: hidden;
      padding: 16px;
      border: 6px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      color: #211826;
      box-shadow: var(--shadow);
    }

    .map-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 12px;
      padding: 0 4px;
      color: #3b243d;
      font-weight: 950;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: center;
      font-size: 12px;
      font-weight: 800;
      color: rgba(33, 24, 38, 0.74);
    }

    .legend-item { display: inline-flex; gap: 6px; align-items: center; }
    .dot { width: 14px; height: 14px; border-radius: 4px; display: inline-block; box-shadow: inset 0 -2px 0 rgba(0,0,0,.18); }
    .dot.available { background: #e7f7ff; }
    .dot.occupied-total { background: var(--occupied-total); }
    .dot.occupied-partial { background: var(--occupied-partial); }

    .seat-map-scroll {
      overflow: auto;
      padding: 10px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.62), rgba(255,255,255,.38)),
        #fff9f1;
    }

    .seat-map {
      position: relative;
      min-width: 1180px;
      min-height: 760px;
      display: grid;
      grid-template-columns: 170px 1fr 112px;
      gap: 18px;
      align-items: stretch;
      padding: 20px 14px;
    }

    .facilities-left,
    .stage-right,
    .center-hall { position: relative; }

    .facilities-left {
      border-right: 3px solid rgba(0,0,0,.5);
      min-height: 700px;
    }

    .wc {
      position: absolute;
      left: 4px;
      width: 44px;
      height: 44px;
      border: 3px solid #333;
      border-radius: 50%;
      background: #fff;
    }

    .wc.top { top: 18px; }
    .wc.bottom { top: 96px; }

    .vertical-word {
      position: absolute;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-weight: 950;
      letter-spacing: .12em;
      color: #111;
    }

    .vertical-word.sanitarios { left: 62px; top: 18px; }
    .vertical-word.stage { left: 42px; top: 140px; font-size: 26px; color: #211826; }

    .store-area {
      position: absolute;
      left: 8px;
      width: 126px;
      padding: 8px;
      border: 3px solid #333;
      border-radius: 14px;
      background: rgba(255,255,255,.6);
    }

    .store-area.toys { top: 220px; }
    .store-area.candy { top: 390px; }
    .store-title { text-align: center; font-size: 12px; font-weight: 950; margin-bottom: 8px; }
    .store-boxes { display: grid; grid-template-columns: 38px 1fr; gap: 8px; align-items: stretch; }
    .small-stack { display: grid; gap: 5px; }
    .small-box, .big-box { border: 2px solid #444; background: #fff; border-radius: 5px; }
    .small-box { height: 22px; }
    .big-box { min-height: 76px; }

    .entrance-row {
      position: absolute;
      left: 4px;
      bottom: 16px;
      display: grid;
      gap: 8px;
    }

    .entrance {
      width: 130px;
      padding: 8px 10px;
      border: 2px dashed #333;
      border-radius: 12px;
      text-align: center;
      font-size: 12px;
      font-weight: 900;
      background: rgba(255,255,255,.58);
    }

    .center-hall {
      min-height: 700px;
      border-left: 3px solid rgba(0,0,0,.25);
      border-right: 3px solid rgba(0,0,0,.25);
      padding: 8px 32px 92px;
    }

    .hall-extras {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .side-door {
      position: absolute;
      left: -8px;
      top: 240px;
      width: 16px;
      height: 120px;
      border: 2px solid #333;
      border-left: 0;
      background: #fff;
    }

    .bottom-door,
    .bottom-door.right {
      position: absolute;
      bottom: 12px;
      width: 90px;
      height: 38px;
      border: 2px solid #333;
      background: #fff;
    }

    .bottom-door { left: 170px; }
    .bottom-door.right { right: 170px; }

    .emergency {
      position: absolute;
      bottom: 52px;
      width: 112px;
      text-align: center;
      font-size: 12px;
      font-weight: 950;
      line-height: 1.1;
      color: #111;
    }

    .emergency.left { left: 118px; }
    .emergency.right { right: 118px; }

    .tiny-stage-arrow {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      width: 82px;
      height: 66px;
      border: 2px solid #333;
      background: repeating-linear-gradient(90deg, transparent 0, transparent 11px, rgba(0,0,0,.55) 12px, transparent 13px), #fff;
    }

    .tiny-stage-arrow::after {
      content: "";
      position: absolute;
      right: 8px;
      top: 50%;
      width: 0;
      height: 0;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      border-left: 16px solid #111;
      transform: translateY(-50%);
    }

    .stage-right {
      min-height: 700px;
      border-left: 4px solid #111;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(213,156,10,.34), rgba(255,79,163,.18));
    }

    .sections-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      gap: 38px;
      padding-top: 24px;
    }

    .section-block {
      display: grid;
      gap: 14px;
      justify-items: center;
    }

    .section-title {
      min-width: calc((var(--seat) * 7) + (var(--gap) * 6));
      text-align: center;
      font-size: 24px;
      font-weight: 1000;
      letter-spacing: .08em;
      text-shadow: 0 5px 0 rgba(0,0,0,.11), 0 0 10px rgba(255,255,255,.8);
      user-select: none;
    }

    .section-title.gold { color: var(--gold); }
    .section-title.pink { color: var(--pink); }
    .section-title.blue { color: var(--blue); }

    .seat-grid {
      display: grid;
      grid-template-columns: repeat(7, var(--seat));
      gap: var(--gap);
      align-items: center;
      justify-content: center;
    }

    .seat {
      width: var(--seat);
      height: var(--seat);
      border: 0;
      border-radius: 7px;
      color: rgba(0,0,0,.82);
      font-size: 10px;
      font-weight: 950;
      letter-spacing: -0.04em;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,.16), 0 2px 8px rgba(0,0,0,.12);
      position: relative;
      touch-action: manipulation;
      cursor: default;
    }

    .seat.gold { background: linear-gradient(180deg, var(--gold-2), var(--gold)); }
    .seat.pink { background: linear-gradient(180deg, var(--pink-2), var(--pink)); }
    .seat.blue { background: linear-gradient(180deg, var(--blue-2), var(--blue)); }

    .seat.occupied-total {
      background: var(--occupied-total) !important;
      color: rgba(255,255,255,.72);
      text-decoration: line-through;
      filter: grayscale(.25);
    }

    .seat.occupied-partial {
      background: var(--occupied-partial) !important;
      color: #fff8ed;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,.24), 0 0 0 2px rgba(255,255,255,.35);
    }

    .sync-badge {
      position: absolute;
      right: 18px;
      bottom: 18px;
      z-index: 5;
      max-width: min(360px, calc(100% - 36px));
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(18, 4, 31, .86);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      box-shadow: var(--shadow);
      pointer-events: none;
    }

    @media (max-width: 760px) {
      body { padding: 8px; place-items: start; }
      .map-card { padding: 10px; border-width: 4px; border-radius: 18px; }
      .map-toolbar { display: block; }
      .legend { margin-top: 8px; }
      :root { --seat: 28px; --gap: 7px; }
      .seat-map { min-width: 1180px; }
      .sections-wrap { gap: 32px; }
    }
  </style>
</head>
<body>
  <main class="map-only-shell">
    <section class="map-card" aria-label="Mapa de asientos en tiempo real">
      <div class="map-toolbar">
        <strong>Mapa de asientos</strong>
        <div class="legend" aria-label="Leyenda de estado de butacas">
          <span class="legend-item"><i class="dot available"></i> Disponible</span>
          <span class="legend-item"><i class="dot occupied-total"></i> Ocupado total</span>
          <span class="legend-item"><i class="dot occupied-partial"></i> Ocupado parcial</span>
        </div>
      </div>

      <div class="seat-map-scroll" aria-label="Mapa desplazable de butacas">
        <div class="seat-map">
          <aside class="facilities-left" aria-hidden="true">
            <div class="wc top"></div>
            <div class="vertical-word sanitarios">SANITARIOS</div>
            <div class="wc bottom"></div>
            <div class="store-area toys">
              <div class="store-title">JUGUETERIA</div>
              <div class="store-boxes"><div class="small-stack"><div class="small-box"></div><div class="small-box"></div><div class="small-box"></div></div><div class="big-box"></div></div>
            </div>
            <div class="store-area candy">
              <div class="store-title">DULCERIA</div>
              <div class="store-boxes"><div class="small-stack"><div class="small-box"></div><div class="small-box"></div><div class="small-box"></div></div><div class="big-box"></div></div>
            </div>
            <div class="entrance-row"><div class="entrance">Entrada</div><div class="entrance">Entrada</div></div>
          </aside>

          <section class="center-hall">
            <div class="hall-extras" aria-hidden="true">
              <div class="side-door"></div>
              <div class="bottom-door"></div>
              <div class="bottom-door right"></div>
              <div class="emergency left">EMERGENCY<br>EXIT</div>
              <div class="emergency right">EMERGENCY<br>EXIT</div>
              <div class="tiny-stage-arrow"></div>
            </div>
            <div id="sectionsWrap" class="sections-wrap"></div>
          </section>

          <aside class="stage-right" aria-hidden="true">
            <div class="vertical-word stage">ESCENARIO HUNTRIX</div>
          </aside>
        </div>
      </div>

      <div id="syncBadge" class="sync-badge">Sincronizando con Sheets...</div>
    </section>
  </main>

  <script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyEblsUPY-PHyV6zMMY3Hg27sBGNqTJuqzxSSJVpfK8sGadVucvn_ZDEZKK0l8igOw5/exec';
    const SYNC_INTERVAL_MS = 15000;

    const sections = [
      { id: 'general2', title: 'GENERAL 2', labelClass: 'blue', seatClass: 'blue', price: 100, columns: ['T','S','R','Q','P','O','Ñ'] },
      { id: 'general1', title: 'GENERAL 1', labelClass: 'pink', seatClass: 'pink', price: 150, columns: ['N','M','L','K','J','I','H'] },
      { id: 'golden', title: 'GOLDEN', labelClass: 'gold', seatClass: 'gold', price: 200, columns: ['G','F','E','D','C','B','A'] }
    ];

    let occupiedTotal = new Set();
    let occupiedPartial = new Set();
    let seatDetails = {};

    const sectionsWrap = document.getElementById('sectionsWrap');
    const syncBadge = document.getElementById('syncBadge');

    function buildMap() {
      sectionsWrap.innerHTML = '';

      sections.forEach(section => {
        const block = document.createElement('article');
        block.className = 'section-block';
        block.setAttribute('aria-label', `${section.title}, $${section.price} por boleto`);

        const topGrid = makeSeatGrid(section, 1, 15);
        const title = document.createElement('div');
        title.className = `section-title ${section.labelClass}`;
        title.textContent = section.title;
        const bottomGrid = makeSeatGrid(section, 16, 30);

        block.append(topGrid, title, bottomGrid);
        sectionsWrap.appendChild(block);
      });
    }

    function makeSeatGrid(section, startRow, endRow) {
      const grid = document.createElement('div');
      grid.className = 'seat-grid';

      for (let row = startRow; row <= endRow; row++) {
        section.columns.forEach(col => {
          const seatId = `${row}${col}`;
          const btn = document.createElement('button');
          btn.className = `seat ${section.seatClass}`;
          btn.type = 'button';
          btn.textContent = seatId;
          btn.dataset.seatId = seatId;
          btn.dataset.sectionTitle = section.title;
          btn.dataset.price = section.price;
          btn.setAttribute('aria-label', `${section.title} asiento ${seatId}, disponible`);
          btn.tabIndex = -1;
          applySeatStateToButton(btn);
          grid.appendChild(btn);
        });
      }

      return grid;
    }

    function applySeatStateToButton(btn) {
      const seatId = normalizeSeatId(btn.dataset.seatId);
      const originalId = btn.dataset.seatId;
      const detail = seatDetails[seatId] || {};

      btn.classList.remove('occupied-total', 'occupied-partial');
      btn.title = `${originalId} disponible`;
      btn.setAttribute('aria-label', `${btn.dataset.sectionTitle} asiento ${originalId}, disponible`);

      if (occupiedTotal.has(seatId)) {
        btn.classList.add('occupied-total');
        btn.title = `${originalId} ocupado total`;
        btn.setAttribute('aria-label', `${btn.dataset.sectionTitle} asiento ${originalId}, ocupado total`);
      } else if (occupiedPartial.has(seatId)) {
        btn.classList.add('occupied-partial');
        const paid = detail.paid ? ` de $${detail.paid}` : '';
        const remaining = detail.remaining ? `, resta $${detail.remaining}` : '';
        btn.title = `${originalId} pago parcial${paid}${remaining}`;
        btn.setAttribute('aria-label', `${btn.dataset.sectionTitle} asiento ${originalId}, ocupado parcial`);
      }
    }

    function applyAllSeatStates() {
      document.querySelectorAll('.seat').forEach(applySeatStateToButton);
    }

    async function syncFromSheets() {
      try {
        syncBadge.textContent = 'Sincronizando con Sheets...';
        const response = await fetch(`${GOOGLE_SCRIPT_URL}?_=${Date.now()}`, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        const normalized = normalizeSheetResponse(data);

        occupiedTotal = normalized.occupiedTotal;
        occupiedPartial = normalized.occupiedPartial;
        seatDetails = normalized.details;

        applyAllSeatStates();
        syncBadge.textContent = `Actualizado ${new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
      } catch (error) {
        console.error(error);
        syncBadge.textContent = 'No se pudo sincronizar. Revisa la URL de Apps Script.';
      }
    }

    function normalizeSheetResponse(payload) {
      const total = new Set();
      const partial = new Set();
      const details = {};

      const explicitTotal = firstArray(payload, ['occupiedTotal', 'ocupadoTotal', 'total', 'occupied_total']);
      const explicitPartial = firstArray(payload, ['occupiedPartial', 'ocupadoParcial', 'partial', 'occupied_partial']);

      addSeatList(explicitTotal, 'total', total, partial, details);
      addSeatList(explicitPartial, 'partial', total, partial, details);

      const rows = extractRows(payload);
      addSeatList(rows, null, total, partial, details);

      return { occupiedTotal: total, occupiedPartial: partial, details };
    }

    function firstArray(obj, keys) {
      if (!obj || typeof obj !== 'object') return [];
      for (const key of keys) {
        if (Array.isArray(obj[key])) return obj[key];
      }
      return [];
    }

    function extractRows(payload) {
      if (Array.isArray(payload)) return payload;
      if (!payload || typeof payload !== 'object') return [];

      const possibleKeys = ['rows', 'data', 'reservas', 'records', 'items', 'seats', 'occupied', 'occupiedSeats', 'asientos', 'tickets'];
      for (const key of possibleKeys) {
        if (Array.isArray(payload[key])) return payload[key];
      }

      return [];
    }

    function addSeatList(list, forcedStatus, total, partial, details) {
      if (!Array.isArray(list)) return;

      list.forEach(item => {
        const parsed = parseSeatItem(item, forcedStatus);
        if (!parsed.id) return;

        if (parsed.status === 'partial') {
          partial.add(parsed.id);
          total.delete(parsed.id);
        } else {
          total.add(parsed.id);
          partial.delete(parsed.id);
        }

        details[parsed.id] = parsed;
      });
    }

    function parseSeatItem(item, forcedStatus) {
      if (typeof item === 'string' || typeof item === 'number') {
        return { id: normalizeSeatId(item), status: forcedStatus || 'total' };
      }

      if (!item || typeof item !== 'object') return { id: '', status: 'total' };

      const rawId = pick(item, ['seatId', 'seatID', 'asientoId', 'asientoID', 'asiento', 'seat', 'id', 'ID del Asiento', 'ID Asiento', 'ID']);
      const rawStatus = forcedStatus || pick(item, ['status', 'estado', 'Estado', 'bookingStatus', 'Estado al registrar']);
      const paid = pick(item, ['paid', 'pago', 'pagoRealizado', 'Pago realizado', 'Pago Realizado', 'Pago recibido', 'payment']);
      const remaining = pick(item, ['remaining', 'saldo', 'saldoRestante', 'Saldo restante', 'Saldo Restante']);

      return {
        id: normalizeSeatId(rawId),
        status: normalizeStatus(rawStatus),
        paid: normalizeMoney(paid),
        remaining: normalizeMoney(remaining),
        raw: item
      };
    }

    function pick(obj, keys) {
      for (const key of keys) {
        if (obj[key] !== undefined && obj[key] !== null && obj[key] !== '') return obj[key];
      }
      return '';
    }

    function normalizeSeatId(value) {
      return String(value || '').trim().toUpperCase().replace(/\s+/g, '');
    }

    function normalizeStatus(value) {
      const text = String(value || '').toLowerCase();
      if (text.includes('parcial') || text.includes('partial')) return 'partial';
      return 'total';
    }

    function normalizeMoney(value) {
      if (value === undefined || value === null || value === '') return '';
      const number = Number(String(value).replace(/[^0-9.-]/g, ''));
      return Number.isFinite(number) ? number.toLocaleString('es-MX') : String(value);
    }

    buildMap();
    syncFromSheets();
    setInterval(syncFromSheets, SYNC_INTERVAL_MS);
    window.addEventListener('focus', syncFromSheets);
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) syncFromSheets();
    });
  </script>
</body>
</html>
